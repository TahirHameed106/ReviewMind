version: '3.8'

services:
  ml-service:
    build: ./ml_service
    ports:
      - "8000:8000"
    environment:
      - MAX_ROWS_PER_UPLOAD=5000
      - MAX_VECTORS=50000
    volumes:
      - ./ml_service/data:/app/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - ml-service
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped