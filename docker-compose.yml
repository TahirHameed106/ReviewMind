version: '3.9'

services:
  ml-service:
    build: ./ml_service
    ports:
      - "8000:8000"
    environment:
      - MAX_ROWS=50000
      - MAX_FILE_SIZE_MB=20
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
      - PORT=3000
    depends_on:
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped